name: Build Assets CI
run-name: "Build Assets CI - ${{ github.ref }}"
on:
  push:
    branches: [ main, dev ]

  pull_request:
    branches: [ main, dev ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Gulp Build (Node 22)
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: 22
      PNPM_VERSION: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 #v6: 6.0.2

      # ✅ PNPM PRIMERO
      - name: Install pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 #v5 #5.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      # ✅ NODE DESPUÉS (usa cache pnpm correctamente)
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6 #6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Gulp build
        run: pnpm exec gulp build

      - name: Verify build output
        run: |
          if [ ! -d "build" ]; then
            echo "❌ build directory does not exist"
            exit 1
          fi

          if [ -z "$(ls -A build)" ]; then
            echo "❌ build directory is empty"
            exit 1
          fi

          echo "✅ Build output verified"
